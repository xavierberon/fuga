<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FUGA editor de precios</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    :root {
      --bg: #ffffff;
      --panel: rgba(255, 255, 255, 0.94);
      --panel-border: rgba(221, 221, 221, 0.92);
      --accent: #f97316;
      --accent-dark: #dd5b0f;
      --accent-soft: #fff4ec;
      --text: #171717;
      --muted: #6b7280;
      --shadow: 0 18px 40px rgba(24, 24, 27, 0.08);
      --shadow-soft: 0 8px 22px rgba(24, 24, 27, 0.08);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      padding: 24px;
      position: relative;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      display: none;
    }

    body::before {
      top: -80px;
      left: -100px;
      background: radial-gradient(circle, rgba(249, 115, 22, 0.18), transparent 70%);
    }

    body::after {
      right: -60px;
      bottom: -90px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.9), transparent 68%);
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 1360px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      gap: 20px;
      align-items: start;
    }

    .toolbar {
      position: sticky;
      top: 24px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      padding: 16px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .toolbar-copy {
      position: relative;
      padding: 28px;
      border-radius: 20px;
      overflow: hidden;
      background: #ffffff;
      color: var(--text);
      min-height: 160px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border: 1px solid rgba(231, 226, 220, 0.9);
      gap: 22px;
    }

    .toolbar-copy::before,
    .toolbar-copy::after {
      content: "";
      position: absolute;
      border-radius: 999px;
    }

    .toolbar-copy::before {
      display: none;
    }

    .toolbar-copy::after {
      width: 120px;
      height: 120px;
      right: -38px;
      bottom: -38px;
      background: rgba(249, 115, 22, 0.06);
    }

    .toolbar-copy h1 {
      margin: 0 0 10px;
      font-size: 1.9rem;
      line-height: 0.9;
      letter-spacing: -0.05em;
      max-width: 260px;
      font-weight: 700;
      position: relative;
      z-index: 1;
    }

    .toolbar-copy p {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
      max-width: 260px;
      position: relative;
      z-index: 1;
    }

    .brand-lockup {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 18px;
    }

    .brand-logo {
      width: 168px;
      max-width: 100%;
      height: auto;
      display: block;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      align-content: start;
      padding: 12px;
      border-radius: 20px;
      background: #ffffff;
      border: 1px solid rgba(231, 226, 220, 0.92);
      box-shadow: none;
    }

    button,
    .upload-label {
      appearance: none;
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 14px 16px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: -0.01em;
    }

    button:hover,
    .upload-label:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-soft);
    }

    .upload-label,
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .btn-secondary {
      background: #111111;
      color: #ffffff;
      border-color: #111111;
    }

    .btn-danger {
      background: #ffffff;
      color: #111111;
      border-color: rgba(206, 206, 206, 0.95);
    }

    .btn-export {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    #imageLoader {
      display: none;
    }

    .workspace-card {
      padding: 16px;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(232, 232, 232, 0.92);
      border-radius: 28px;
      box-shadow: var(--shadow);
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .status-bar span {
      padding: 10px 13px;
      border-radius: 999px;
      background: rgba(250, 250, 249, 0.92);
      border: 1px solid rgba(232, 232, 232, 0.92);
    }

    .workspace {
      position: relative;
      width: 100%;
      overflow: auto;
      border-radius: 24px;
      background: #ffffff;
      min-height: 420px;
      padding: 20px;
      border: 1px solid rgba(236, 236, 236, 0.92);
    }

    .canvas-list {
      display: grid;
      gap: 24px;
      width: 100%;
      align-content: start;
    }

    .menu-sheet {
      position: relative;
      width: min(100%, 960px);
      margin: 0 auto;
      padding: 14px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(236, 236, 236, 0.92);
      box-shadow: 0 14px 34px rgba(24, 24, 27, 0.06);
      transition: transform 0.18s ease, box-shadow 0.18s ease, outline-color 0.18s ease;
      outline: 1px solid transparent;
    }

    .menu-sheet.active {
      outline-color: rgba(249, 115, 22, 0.32);
      box-shadow: 0 20px 42px rgba(24, 24, 27, 0.08);
      transform: translateY(-2px);
    }

    .sheet-badge {
      position: absolute;
      top: 12px;
      left: 26px;
      z-index: 2;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--accent-dark);
      font-size: 0.78rem;
      letter-spacing: 0.01em;
      border: 1px solid rgba(244, 224, 210, 0.95);
      box-shadow: 0 8px 20px rgba(24, 24, 27, 0.05);
      pointer-events: none;
    }

    .sheet-frame {
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      background: #fff;
      padding: 10px;
      border: 1px solid rgba(235, 230, 224, 0.9);
    }

    .sheet-pdf,
    .sheet-overlay,
    .sheet-frame img,
    .sheet-frame canvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 14px;
      user-select: none;
      -webkit-user-drag: none;
    }

    .sheet-stage {
      position: relative;
      width: 100%;
      aspect-ratio: var(--sheet-ratio, 1 / 1.4142);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 14px 28px rgba(24, 24, 27, 0.06);
      background: #fff;
    }

    .sheet-pdf {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
      pointer-events: none;
    }

    .sheet-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .guide-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .guide-line {
      position: absolute;
      background: rgba(249, 115, 22, 0.9);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.75);
    }

    .guide-line.baseline {
      background: rgba(33, 197, 191, 0.95);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.55);
    }

    .guide-line.vertical {
      width: 1px;
      top: 0;
      bottom: 0;
    }

    .guide-line.horizontal {
      height: 1px;
      left: 0;
      right: 0;
    }

    .guide-measure {
      position: absolute;
      padding: 4px 8px;
      border-radius: 999px;
      background: #111111;
      color: #ffffff;
      font-size: 11px;
      font-weight: 600;
      line-height: 1;
      letter-spacing: 0.01em;
      white-space: nowrap;
      transform: translate(-50%, -50%);
      box-shadow: 0 8px 18px rgba(17, 17, 17, 0.16);
    }

    .sheet-overlay .price-tag {
      pointer-events: auto;
      z-index: 2;
    }

    .export-source-canvas {
      display: none !important;
    }

    .empty-state {
      position: absolute;
      inset: 20px;
      display: none;
      place-items: center;
      padding: 48px;
      text-align: center;
      color: var(--muted);
      pointer-events: none;
      z-index: 0;
    }

    .empty-state span {
      display: inline-block;
      max-width: 460px;
      padding: 24px 26px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(231, 226, 220, 0.92);
      box-shadow: 0 12px 28px rgba(24, 24, 27, 0.06);
    }

    .price-tag {
      position: absolute;
      width: 120px;
      min-height: 30px;
      padding: 0;
      border: 1px solid rgba(17, 17, 17, 0.12);
      background: transparent;
      border-radius: 12px;
      cursor: move;
      touch-action: none;
      box-shadow: none;
      transition: border-color 0.16s ease, box-shadow 0.16s ease, background-color 0.16s ease, transform 0.16s ease;
    }

    .price-tag.active {
      border-color: rgba(33, 197, 191, 0.72);
      box-shadow: 0 0 0 3px rgba(33, 197, 191, 0.14);
      background: transparent;
      transform: translateY(-1px);
    }

    .price-tag input {
      width: 100%;
      min-height: 30px;
      padding: 6px 10px 5px;
      border: 0;
      outline: none;
      background: transparent;
      color: #000;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 10pt;
      line-height: 1.05;
      text-align: left;
      cursor: text;
      font-weight: 500;
    }

    .price-tag input::placeholder {
      color: rgba(0, 0, 0, 0.34);
    }

    .price-tag.exporting {
      border-color: transparent;
      box-shadow: none;
      background: transparent;
    }

    .price-tag.exporting input {
      padding: 0;
    }

    .price-tag.committed {
      border-color: transparent;
      box-shadow: none;
      background: transparent;
    }

    .price-tag.committed input {
      padding: 6px 10px 5px;
    }

    .price-tag.committed:not(.active) input {
      cursor: move;
    }

    .hide-for-export {
      display: none !important;
    }

    @media (max-width: 720px) {
      body {
        padding: 16px;
      }

      .toolbar {
        padding: 16px;
        position: static;
      }

      .toolbar-copy h1 {
        font-size: 1.7rem;
      }

      .controls {
        width: 100%;
        grid-template-columns: 1fr;
      }

      .controls > * {
        justify-content: center;
        text-align: center;
      }

      .workspace {
        padding: 12px;
      }

      .menu-sheet {
        padding: 10px;
        border-radius: 20px;
      }

      .sheet-frame {
        padding: 10px;
      }

      .empty-state {
        inset: 12px;
      }
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
      }

      .toolbar {
        position: static;
      }
    }

    @media print {
      body {
        background: #fff;
        padding: 0;
      }

      .toolbar,
      .status-bar {
        display: none;
      }

      .workspace-card {
        padding: 0;
        border: 0;
        box-shadow: none;
        background: #fff;
      }

      .workspace {
        padding: 0;
        background: #fff;
      }
    }
  </style>
</head>

      <div class="controls">
        <label class="upload-label" for="imageLoader">Subir PDF</label>
        <input id="imageLoader" type="file" accept="application/pdf,.pdf" multiple>
        <button id="addPriceBtn" class="btn-secondary" type="button">Anadir Precio</button>
        <button id="duplicateBtn" class="btn-secondary" type="button">Duplicar Precio</button>
        <button id="clearBtn" class="btn-danger" type="button">Limpiar todo</button>
        <button id="exportBtn" class="btn-export" type="button">Exportar a PDF</button>
      </div>
    </section>

    <section class="workspace-card">
      <div class="status-bar">
        <span id="message">Carga uno o varios PDF para empezar.</span>
      </div>

      <div class="workspace">
        <div id="canvasList" class="canvas-list"></div>
        <div id="emptyState" class="empty-state">
          <span>El area de trabajo aparecera aqui. Cada PDF se convierte en un lienzo apilado para que edites todo junto y luego exportes el conjunto completo.</span>
        </div>
      </div>
    </section>
  </div>

  <script>
    const imageLoader = document.getElementById('imageLoader');
    const addPriceBtn = document.getElementById('addPriceBtn');
    const duplicateBtn = document.getElementById('duplicateBtn');
    const clearBtn = document.getElementById('clearBtn');
    const exportBtn = document.getElementById('exportBtn');
    const canvasList = document.getElementById('canvasList');
    const message = document.getElementById('message');
    const emptyState = document.getElementById('emptyState');
    const SNAP_THRESHOLD = 6;
    if (window.pdfjsLib) {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }

    let priceCount = 0;
    let dragState = null;
    let activeSheetId = null;
    let sheetCount = 0;
    let lastCreatedTag = null;

    function updateStatus(text) {
      message.textContent = text;
      addPriceBtn.disabled = !activeSheetId;
      addPriceBtn.style.opacity = addPriceBtn.disabled ? '0.55' : '1';
      addPriceBtn.style.cursor = addPriceBtn.disabled ? 'not-allowed' : 'pointer';
      duplicateBtn.disabled = !document.querySelector('.price-tag');
      duplicateBtn.style.opacity = duplicateBtn.disabled ? '0.55' : '1';
      duplicateBtn.style.cursor = duplicateBtn.disabled ? 'not-allowed' : 'pointer';
    }

    function toggleEmptyState() {
      emptyState.style.display = canvasList.querySelector('.menu-sheet') ? 'none' : 'grid';
    }

    function getSheetElement(sheetId) {
      return canvasList.querySelector(`[data-sheet-id="${sheetId}"]`);
    }

    function getSheetFrame(sheetId) {
      const sheet = getSheetElement(sheetId);
      return sheet ? sheet.querySelector('.sheet-frame') : null;
    }

    function getSheetOverlay(sheetOrId) {
      const sheet = typeof sheetOrId === 'string' ? getSheetElement(sheetOrId) : sheetOrId;
      return sheet ? sheet.querySelector('.sheet-overlay') : null;
    }

    function getSheetRect(sheetId) {
      const overlay = getSheetOverlay(sheetId);
      return overlay ? overlay.getBoundingClientRect() : null;
    }

    function getSheetCanvas(sheet) {
      return sheet ? sheet.querySelector('.export-source-canvas') : null;
    }

    function getGuideLayer(sheetOrId) {
      const sheet = typeof sheetOrId === 'string' ? getSheetElement(sheetOrId) : sheetOrId;
      return sheet ? sheet.querySelector('.guide-layer') : null;
    }

    function clearGuides(sheetOrId) {
      const guideLayer = getGuideLayer(sheetOrId);
      if (guideLayer) {
        guideLayer.innerHTML = '';
      }
    }

    function renderGuideLine(guideLayer, axis, position) {
      const guide = document.createElement('div');
      guide.className = `guide-line ${axis === 'x' ? 'vertical' : 'horizontal'}`;
      if (axis === 'x') {
        guide.style.left = `${position}px`;
      } else {
        guide.style.top = `${position}px`;
      }
      guideLayer.appendChild(guide);
    }

    function renderBaselineGuide(guideLayer, position) {
      const guide = document.createElement('div');
      guide.className = 'guide-line horizontal baseline';
      guide.style.top = `${position}px`;
      guideLayer.appendChild(guide);
    }

    function renderColumnGuide(guideLayer, position) {
      const guide = document.createElement('div');
      guide.className = 'guide-line vertical baseline';
      guide.style.left = `${position}px`;
      guideLayer.appendChild(guide);
    }

    function renderMeasure(guideLayer, x, y, text) {
      const label = document.createElement('div');
      label.className = 'guide-measure';
      label.style.left = `${x}px`;
      label.style.top = `${y}px`;
      label.textContent = text;
      guideLayer.appendChild(label);
    }

    function findSnapPosition(tag, proposedX, proposedY) {
      const overlay = tag.closest('.sheet-overlay');
      const guideLayer = getGuideLayer(tag.dataset.sheetId);
      if (!overlay || !guideLayer) {
        return { x: proposedX, y: proposedY };
      }

      clearGuides(tag.dataset.sheetId);

      const tagWidth = tag.offsetWidth;
      const tagHeight = tag.offsetHeight;
      const candidates = Array.from(overlay.querySelectorAll('.price-tag')).filter((item) => item !== tag);
      const ownPointsX = [
        { key: 'left', value: proposedX },
        { key: 'center', value: proposedX + tagWidth / 2 },
        { key: 'right', value: proposedX + tagWidth }
      ];
      const ownPointsY = [
        { key: 'top', value: proposedY },
        { key: 'middle', value: proposedY + tagHeight / 2 },
        { key: 'bottom', value: proposedY + tagHeight }
      ];

      let bestX = null;
      let bestY = null;

      candidates.forEach((other) => {
        const otherX = parseFloat(other.style.left || '0');
        const otherY = parseFloat(other.style.top || '0');
        const otherPointsX = [
          { key: 'left', value: otherX },
          { key: 'center', value: otherX + other.offsetWidth / 2 },
          { key: 'right', value: otherX + other.offsetWidth }
        ];
        const otherPointsY = [
          { key: 'top', value: otherY },
          { key: 'middle', value: otherY + other.offsetHeight / 2 },
          { key: 'bottom', value: otherY + other.offsetHeight }
        ];

        ownPointsX.forEach((ownPoint) => {
          otherPointsX.forEach((otherPoint) => {
            const delta = otherPoint.value - ownPoint.value;
            const distance = Math.abs(delta);
            if (distance <= SNAP_THRESHOLD && (!bestX || distance < bestX.distance)) {
              bestX = {
                distance,
                snappedX: proposedX + delta,
                guideX: otherPoint.value,
                other
              };
            }
          });
        });

        ownPointsY.forEach((ownPoint) => {
          otherPointsY.forEach((otherPoint) => {
            const delta = otherPoint.value - ownPoint.value;
            const distance = Math.abs(delta);
            if (distance <= SNAP_THRESHOLD && (!bestY || distance < bestY.distance)) {
              bestY = {
                distance,
                snappedY: proposedY + delta,
                guideY: otherPoint.value,
                other
              };
            }
          });
        });
      });

      let nextX = proposedX;
      let nextY = proposedY;

      if (bestX) {
        nextX = bestX.snappedX;
        renderGuideLine(guideLayer, 'x', bestX.guideX);
      }

      if (bestY) {
        nextY = bestY.snappedY;
        renderGuideLine(guideLayer, 'y', bestY.guideY);
      }

      const activeRect = {
        left: nextX,
        right: nextX + tagWidth,
        top: nextY,
        bottom: nextY + tagHeight
      };
      const relatedTag = bestX?.other || bestY?.other || candidates[0];

      if (relatedTag) {
        const otherX = parseFloat(relatedTag.style.left || '0');
        const otherY = parseFloat(relatedTag.style.top || '0');
        const otherRect = {
          left: otherX,
          right: otherX + relatedTag.offsetWidth,
          top: otherY,
          bottom: otherY + relatedTag.offsetHeight
        };
        const horizontalOverlap = !(activeRect.right < otherRect.left || activeRect.left > otherRect.right);
        const verticalOverlap = !(activeRect.bottom < otherRect.top || activeRect.top > otherRect.bottom);

        if (verticalOverlap) {
          const leftGap = Math.abs(activeRect.left - otherRect.right);
          const rightGap = Math.abs(otherRect.left - activeRect.right);
          const gap = Math.min(leftGap, rightGap);
          if (Number.isFinite(gap) && gap > 0) {
            const x1 = activeRect.left > otherRect.left ? otherRect.right : activeRect.right;
            const x2 = activeRect.left > otherRect.left ? activeRect.left : otherRect.left;
            const midX = x1 + (x2 - x1) / 2;
            const overlapTop = Math.max(activeRect.top, otherRect.top);
            const overlapBottom = Math.min(activeRect.bottom, otherRect.bottom);
            const midY = overlapTop + (overlapBottom - overlapTop) / 2;
            renderMeasure(guideLayer, midX, midY, `${Math.round(gap)} px`);
          }
        }

        if (horizontalOverlap) {
          const topGap = Math.abs(activeRect.top - otherRect.bottom);
          const bottomGap = Math.abs(otherRect.top - activeRect.bottom);
          const gap = Math.min(topGap, bottomGap);
          if (Number.isFinite(gap) && gap > 0) {
            const y1 = activeRect.top > otherRect.top ? otherRect.bottom : activeRect.bottom;
            const y2 = activeRect.top > otherRect.top ? activeRect.top : otherRect.top;
            const midY = y1 + (y2 - y1) / 2;
            const overlapLeft = Math.max(activeRect.left, otherRect.left);
            const overlapRight = Math.min(activeRect.right, otherRect.right);
            const midX = overlapLeft + (overlapRight - overlapLeft) / 2;
            renderMeasure(guideLayer, midX, midY, `${Math.round(gap)} px`);
          }
        }
      }

      renderMeasure(guideLayer, nextX + tagWidth / 2, Math.max(14, nextY - 14), `${Math.round(nextX)} / ${Math.round(nextY)} px`);

      const input = tag.querySelector('input');
      if (input) {
        const inputStyles = window.getComputedStyle(input);
        const paddingLeft = parseFloat(inputStyles.paddingLeft || '0');
        const paddingTop = parseFloat(inputStyles.paddingTop || '0');
        const fontPx = parseFloat(inputStyles.fontSize || '13.333');
        const lineHeight = parseFloat(inputStyles.lineHeight || String(fontPx * 1.05));
        const baselineY = nextY + paddingTop + lineHeight;
        const columnX = nextX + paddingLeft;
        tag.dataset.anchorX = String(columnX);
        tag.dataset.anchorY = String(baselineY);
        renderBaselineGuide(guideLayer, baselineY);
        renderColumnGuide(guideLayer, columnX);
      }

      return { x: nextX, y: nextY };
    }

    function buildExportCanvas(sheet) {
      const overlay = getSheetOverlay(sheet);
      const sourceCanvas = getSheetCanvas(sheet);
      if (!overlay || !sourceCanvas) {
        return null;
      }

      const exportCanvas = document.createElement('canvas');
      exportCanvas.width = sourceCanvas.width;
      exportCanvas.height = sourceCanvas.height;

      const context = exportCanvas.getContext('2d');
      context.drawImage(sourceCanvas, 0, 0);
      context.fillStyle = '#000000';
      context.textBaseline = 'top';
      context.font = '13.333px "Helvetica Neue", Helvetica, Arial, sans-serif';

      const scaleX = sourceCanvas.width / Math.max(overlay.clientWidth, 1);
      const scaleY = sourceCanvas.height / Math.max(overlay.clientHeight, 1);
      const tags = Array.from(overlay.querySelectorAll('.price-tag'));

      tags.forEach((tag) => {
        const input = tag.querySelector('input');
        if (!input) {
          return;
        }

        const value = (input.value || input.placeholder || '').trim();
        if (!value) {
          return;
        }

        const inputStyles = window.getComputedStyle(input);
        const paddingLeft = parseFloat(inputStyles.paddingLeft || '0');
        const paddingTop = parseFloat(inputStyles.paddingTop || '0');
        const fontPx = parseFloat(inputStyles.fontSize || '13.333');
        const fontSize = fontPx * scaleY;
        const x = (tag.offsetLeft + paddingLeft) * scaleX;
        const y = (tag.offsetTop + paddingTop) * scaleY;

        context.font = `${fontSize}px "Helvetica Neue", Helvetica, Arial, sans-serif`;
        context.fillText(value, x, y);
      });

      return exportCanvas;
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function setTagPosition(tag, x, y) {
      const overlay = tag.closest('.sheet-overlay');
      if (!overlay) {
        return;
      }
      const bounds = overlay.getBoundingClientRect();
      const maxX = Math.max(0, bounds.width - tag.offsetWidth);
      const maxY = Math.max(0, bounds.height - tag.offsetHeight);
      tag.style.left = `${clamp(x, 0, maxX)}px`;
      tag.style.top = `${clamp(y, 0, maxY)}px`;
    }

    function resizeInput(input) {
      const measure = document.createElement('span');
      const styles = window.getComputedStyle(input);
      measure.style.position = 'absolute';
      measure.style.visibility = 'hidden';
      measure.style.whiteSpace = 'pre';
      measure.style.fontFamily = styles.fontFamily;
      measure.style.fontSize = styles.fontSize;
      measure.style.fontWeight = styles.fontWeight;
      measure.textContent = input.value || input.placeholder || '$0';
      document.body.appendChild(measure);
      const width = Math.ceil(measure.getBoundingClientRect().width + 14);
      document.body.removeChild(measure);
      input.parentElement.style.width = `${Math.max(68, Math.min(width, 220))}px`;
    }

    function activateTag(tag) {
      document.querySelectorAll('.price-tag').forEach((item) => item.classList.remove('active'));
      if (tag) {
        tag.classList.add('active');
        tag.classList.remove('committed');
        setActiveSheet(tag.dataset.sheetId);
      }
    }

    function setActiveSheet(sheetId) {
      activeSheetId = sheetId;
      document.querySelectorAll('.menu-sheet').forEach((sheet) => {
        sheet.classList.toggle('active', sheet.dataset.sheetId === sheetId);
      });
      if (sheetId) {
        const sheet = getSheetElement(sheetId);
        const badge = sheet ? sheet.querySelector('.sheet-badge') : null;
        const name = badge ? badge.textContent : 'Lienzo activo';
        updateStatus(`${name} seleccionado. Puedes agregar o mover precios.`);
      } else {
        updateStatus('Carga uno o varios PDF para empezar.');
      }
    }

    function addPriceTag() {
      if (!activeSheetId) {
        updateStatus('Primero carga al menos un PDF y selecciona un lienzo.');
        return;
      }

      const overlay = getSheetOverlay(activeSheetId);
      if (!overlay) {
        updateStatus('No se encontro el lienzo activo.');
        return;
      }

      const localPriceCount = overlay.querySelectorAll('.price-tag').length;
      const initialY = 24 + localPriceCount * 28;

      const tag = document.createElement('div');
      tag.className = 'price-tag active';
      tag.style.left = '24px';
      tag.style.top = `${initialY}px`;
      tag.dataset.index = String(priceCount + 1);
      tag.dataset.sheetId = activeSheetId;

      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = '$0';
      input.value = '';
      input.spellcheck = false;
      input.autocomplete = 'off';

      tag.appendChild(input);
      overlay.appendChild(tag);
      priceCount += 1;
      lastCreatedTag = tag;
      resizeInput(input);
      setTagPosition(tag, 24, initialY);
      updateStatus(`Precio ${priceCount} creado. Puedes arrastrarlo y editarlo.`);
      activateTag(tag);
      input.focus();
      input.select();

      input.addEventListener('input', () => resizeInput(input));
      input.addEventListener('focus', () => activateTag(tag));
      input.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          tag.classList.add('committed');
          tag.classList.remove('active');
          resizeInput(input);
          input.blur();
          clearGuides(tag.dataset.sheetId);
          updateStatus('Precio confirmado.');
        }
      });

      tag.addEventListener('pointerdown', (event) => {
        if (event.target === input) {
          activateTag(tag);
          return;
        }

        const rect = tag.getBoundingClientRect();
        dragState = {
          tag,
          sheetId: tag.dataset.sheetId,
          pointerId: event.pointerId,
          offsetX: event.clientX - rect.left,
          offsetY: event.clientY - rect.top
        };

        tag.setPointerCapture(event.pointerId);
        activateTag(tag);
        event.preventDefault();
      });

      tag.addEventListener('dblclick', () => {
        if (lastCreatedTag === tag) {
          lastCreatedTag = null;
        }
        tag.remove();
        priceCount -= 1;
        clearGuides(tag.dataset.sheetId);
        updateStatus('Precio eliminado con doble clic.');
      });
    }

    function duplicatePriceTag() {
      const sourceTag = document.querySelector('.price-tag.active') || lastCreatedTag || document.querySelector('.price-tag:last-of-type');
      if (!sourceTag) {
        updateStatus('No hay ningun precio para duplicar.');
        return;
      }

      const sheetId = sourceTag.dataset.sheetId;
      const overlay = getSheetOverlay(sheetId);
      if (!overlay) {
        updateStatus('No se encontro el lienzo del precio a duplicar.');
        return;
      }

      setActiveSheet(sheetId);
      const inputValue = sourceTag.querySelector('input')?.value || '';
      addPriceTag();
      const newTag = lastCreatedTag;
      const newInput = newTag ? newTag.querySelector('input') : null;
      if (!newTag || !newInput) {
        return;
      }

      const sourceX = parseFloat(sourceTag.style.left || '0');
      const sourceY = parseFloat(sourceTag.style.top || '0');
      newInput.value = inputValue;
      resizeInput(newInput);
      setTagPosition(newTag, sourceX, sourceY + 24);
      updateStatus('Precio duplicado.');
    }

    function clearAll() {
      const previousActiveSheetId = activeSheetId;
      document.querySelectorAll('.price-tag').forEach((tag) => tag.remove());
      document.querySelectorAll('.menu-sheet').forEach((sheet) => {
        const blobUrl = sheet.dataset.blobUrl;
        if (blobUrl) {
          URL.revokeObjectURL(blobUrl);
        }
        sheet.remove();
      });
      priceCount = 0;
      sheetCount = 0;
      activeSheetId = null;
      imageLoader.value = '';
      lastCreatedTag = null;
      toggleEmptyState();
      clearGuides(previousActiveSheetId);
      updateStatus('Todo limpio. Carga otro PDF para seguir.');
    }

    async function exportToPdf() {
      const sheets = Array.from(document.querySelectorAll('.menu-sheet'));
      if (!sheets.length) {
        updateStatus('No hay PDF cargado para exportar.');
        return;
      }

      updateStatus('Preparando PDF...');
      const tags = Array.from(document.querySelectorAll('.price-tag'));
      const badges = Array.from(document.querySelectorAll('.sheet-badge'));
      tags.forEach((tag) => tag.classList.add('exporting'));
      badges.forEach((badge) => badge.classList.add('hide-for-export'));

      try {
        const { jsPDF } = window.jspdf;
        let pdf = null;

        for (let index = 0; index < sheets.length; index += 1) {
          const sheet = sheets[index];
          const sourceCanvas = getSheetCanvas(sheet);
          const exportCanvas = buildExportCanvas(sheet);
          if (!sourceCanvas || !exportCanvas) {
            continue;
          }
          const pageWidth = Number(sheet.dataset.pageWidth || sourceCanvas.width);
          const pageHeight = Number(sheet.dataset.pageHeight || sourceCanvas.height);

          const imageData = exportCanvas.toDataURL('image/png', 1.0);
          const orientation = pageWidth > pageHeight ? 'landscape' : 'portrait';

          if (!pdf) {
            pdf = new jsPDF({
              orientation,
              unit: 'pt',
              format: [pageWidth, pageHeight],
              compress: true
            });
          } else {
            pdf.addPage([pageWidth, pageHeight], orientation);
            pdf.setPage(index + 1);
          }

          pdf.addImage(imageData, 'PNG', 0, 0, pageWidth, pageHeight, undefined, 'FAST');
        }

        if (!pdf) {
          throw new Error('No se pudo generar el PDF final');
        }

        pdf.save('menu-precios.pdf');
        updateStatus('PDF exportado correctamente.');
      } catch (error) {
        console.error(error);
        updateStatus('No se pudo exportar el PDF. Revisa la consola de Chrome.');
      } finally {
        tags.forEach((tag) => tag.classList.remove('exporting'));
        badges.forEach((badge) => badge.classList.remove('hide-for-export'));
      }
    }

    async function loadPdfFile(file) {
      if (!window.pdfjsLib) {
        throw new Error('pdf.js no cargo correctamente');
      }

      const buffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({
        data: buffer,
        useWorkerFetch: false,
        isEvalSupported: false
      }).promise;
      const page = await pdf.getPage(1);
      const baseViewport = page.getViewport({ scale: 1 });
      const targetWidth = 1800;
      const scale = targetWidth / baseViewport.width;
      const viewport = page.getViewport({ scale });
      const renderCanvas = document.createElement('canvas');
      const context = renderCanvas.getContext('2d');

      renderCanvas.width = Math.floor(viewport.width);
      renderCanvas.height = Math.floor(viewport.height);

      await page.render({
        canvasContext: context,
        viewport,
        intent: 'print'
      }).promise;

      const blobUrl = URL.createObjectURL(file);

      return {
        canvas: renderCanvas,
        blobUrl,
        pageWidth: baseViewport.width,
        pageHeight: baseViewport.height
      };
    }

    function createSheet(pdfAsset, fileName) {
      sheetCount += 1;
      const sheetId = `sheet-${sheetCount}`;
      const sheet = document.createElement('section');
      sheet.className = 'menu-sheet';
      sheet.dataset.sheetId = sheetId;
      sheet.dataset.pageWidth = String(pdfAsset.pageWidth);
      sheet.dataset.pageHeight = String(pdfAsset.pageHeight);
      sheet.dataset.blobUrl = pdfAsset.blobUrl;

      const badge = document.createElement('div');
      badge.className = 'sheet-badge';
      badge.textContent = `PDF ${sheetCount}: ${fileName}`;

      const frame = document.createElement('div');
      frame.className = 'sheet-frame';

      const stage = document.createElement('div');
      stage.className = 'sheet-stage';
      stage.style.setProperty('--sheet-ratio', `${pdfAsset.pageWidth} / ${pdfAsset.pageHeight}`);

      const embed = document.createElement('embed');
      embed.className = 'sheet-pdf';
      embed.type = 'application/pdf';
      embed.src = `${pdfAsset.blobUrl}#page=1&toolbar=0&navpanes=0&scrollbar=0&view=FitH`;

      const overlay = document.createElement('div');
      overlay.className = 'sheet-overlay';
      const guideLayer = document.createElement('div');
      guideLayer.className = 'guide-layer';

      pdfAsset.canvas.classList.add('export-source-canvas');
      pdfAsset.canvas.setAttribute('aria-hidden', 'true');

      stage.appendChild(embed);
      overlay.appendChild(guideLayer);
      stage.appendChild(overlay);
      frame.appendChild(stage);
      frame.appendChild(pdfAsset.canvas);
      sheet.appendChild(badge);
      sheet.appendChild(frame);
      canvasList.appendChild(sheet);

      sheet.addEventListener('pointerdown', (event) => {
        if (!event.target.closest('.price-tag')) {
          setActiveSheet(sheetId);
        }
      });

      return sheetId;
    }

    imageLoader.addEventListener('change', async (event) => {
      const files = Array.from(event.target.files || []);
      if (!files.length) {
        return;
      }

      const invalidFile = files.find((file) => file.type !== 'application/pdf' && !file.name.toLowerCase().endsWith('.pdf'));
      if (invalidFile) {
        updateStatus('Todos los archivos deben ser PDF.');
        imageLoader.value = '';
        return;
      }

      updateStatus(`Procesando ${files.length} PDF...`);

      try {
        let lastSheetId = activeSheetId;
        for (const file of files) {
          const pdfAsset = await loadPdfFile(file);
          lastSheetId = createSheet(pdfAsset, file.name);
        }
        toggleEmptyState();
        if (lastSheetId) {
          setActiveSheet(lastSheetId);
        }
        updateStatus(`${files.length} PDF cargado(s). Haz clic en un lienzo para editarlo o usa el ultimo activo.`);
      } catch (error) {
        console.error(error);
        toggleEmptyState();
        updateStatus('No se pudo leer uno de los PDF. Recarga la pagina y prueba de nuevo.');
      } finally {
        imageLoader.value = '';
      }
    });

    window.addEventListener('pointermove', (event) => {
      if (!dragState) {
        return;
      }

      const bounds = getSheetRect(dragState.sheetId);
      if (!bounds) {
        return;
      }
      const nextX = event.clientX - bounds.left - dragState.offsetX;
      const nextY = event.clientY - bounds.top - dragState.offsetY;
      const snapped = findSnapPosition(dragState.tag, nextX, nextY);
      setTagPosition(dragState.tag, snapped.x, snapped.y);
    });

    window.addEventListener('pointerup', (event) => {
      if (!dragState) {
        return;
      }

      try {
        dragState.tag.releasePointerCapture(event.pointerId);
      } catch (captureError) {
        // Nothing to do if capture is already gone.
      }

      updateStatus('Posicion actualizada.');
      clearGuides(dragState.sheetId);
      dragState = null;
    });

    window.addEventListener('resize', () => {
      document.querySelectorAll('.price-tag').forEach((tag) => {
        const currentX = parseFloat(tag.style.left || '0');
        const currentY = parseFloat(tag.style.top || '0');
        setTagPosition(tag, currentX, currentY);
      });
    });

    addPriceBtn.addEventListener('click', addPriceTag);
    duplicateBtn.addEventListener('click', duplicatePriceTag);
    clearBtn.addEventListener('click', clearAll);
    exportBtn.addEventListener('click', exportToPdf);
    document.addEventListener('pointerdown', (event) => {
      if (!event.target.closest('.price-tag') && !event.target.closest('.menu-sheet')) {
        activateTag(null);
      }
    });

    toggleEmptyState();
    updateStatus('Carga uno o varios PDF para empezar.');
  </script>
</body>
</html>
