<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FUGA editor de precios</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    :root {
      --bg: #ffffff;
      --panel: rgba(255, 255, 255, 0.96);
      --panel-border: rgba(221, 221, 221, 0.92);
      --accent: #f97316;
      --accent-dark: #dd5b0f;
      --text: #171717;
      --muted: #6b7280;
      --shadow: 0 18px 40px rgba(24, 24, 27, 0.08);
      --radius: 24px;
      --guide: rgba(249, 115, 22, 0.9);
      --baseline: rgba(33, 197, 191, 0.95);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    .app {
      max-width: 1360px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      gap: 20px;
      align-items: start;
    }
    .toolbar {
      position: sticky;
      top: 24px;
      display: grid;
      gap: 16px;
      padding: 16px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .toolbar-copy, .controls, .workspace-card {
      background: #fff;
      border: 1px solid rgba(231, 226, 220, 0.92);
      border-radius: 20px;
    }
    .toolbar-copy {
      padding: 28px;
    }
    .brand-logo {
      width: 168px;
      display: block;
      margin-bottom: 18px;
    }
    .toolbar-copy h1 {
      margin: 0 0 10px;
      font-size: 1.9rem;
      line-height: 0.9;
      letter-spacing: -0.05em;
    }
    .toolbar-copy p {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }
    .controls {
      padding: 12px;
      display: grid;
      gap: 10px;
    }
    button, .upload-label {
      appearance: none;
      border: 1px solid transparent;
      border-radius: 999px;
      min-height: 50px;
      padding: 14px 16px;
      font: inherit;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    button:hover, .upload-label:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 22px rgba(24, 24, 27, 0.08);
    }
    .upload-label, .btn-export {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-secondary {
      background: #111;
      color: #fff;
      border-color: #111;
    }
    .btn-danger {
      background: #fff;
      color: #111;
      border-color: rgba(206, 206, 206, 0.95);
    }
    #imageLoader { display: none; }
    .workspace-card {
      padding: 16px;
      box-shadow: var(--shadow);
    }
    .status-bar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .status-bar span {
      padding: 10px 13px;
      border-radius: 999px;
      background: rgba(250, 250, 249, 0.92);
      border: 1px solid rgba(232, 232, 232, 0.92);
    }
    .workspace {
      position: relative;
      min-height: 420px;
      padding: 20px;
      border-radius: 24px;
      background: #fff;
      border: 1px solid rgba(236, 236, 236, 0.92);
    }
    .canvas-list {
      display: grid;
      gap: 24px;
      width: 100%;
    }
    .empty-state {
      position: absolute;
      inset: 20px;
      display: none;
      place-items: center;
      text-align: center;
      color: var(--muted);
      pointer-events: none;
    }
    .empty-state span {
      max-width: 460px;
      padding: 24px 26px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(231, 226, 220, 0.92);
      box-shadow: 0 12px 28px rgba(24, 24, 27, 0.06);
    }
    .menu-sheet {
      position: relative;
      width: min(100%, 960px);
      margin: 0 auto;
      padding: 14px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(236, 236, 236, 0.92);
      box-shadow: 0 14px 34px rgba(24, 24, 27, 0.06);
      outline: 1px solid transparent;
    }
    .menu-sheet.active {
      outline-color: rgba(249, 115, 22, 0.32);
      box-shadow: 0 20px 42px rgba(24, 24, 27, 0.08);
      transform: translateY(-2px);
    }
    .sheet-badge {
      position: absolute;
      top: 12px;
      left: 26px;
      z-index: 3;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--accent-dark);
      font-size: 0.78rem;
      border: 1px solid rgba(244, 224, 210, 0.95);
      box-shadow: 0 8px 20px rgba(24, 24, 27, 0.05);
      pointer-events: none;
    }
    .sheet-frame {
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      background: #fff;
      padding: 10px;
      border: 1px solid rgba(235, 230, 224, 0.9);
    }
    .sheet-stage {
      position: relative;
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 14px 28px rgba(24, 24, 27, 0.06);
      background: #fff;
    }
    .sheet-canvas, .sheet-overlay {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 14px;
      user-select: none;
      -webkit-user-drag: none;
    }
    .sheet-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .guide-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }
    .guide-line {
      position: absolute;
      background: var(--guide);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.75);
    }
    .guide-line.baseline {
      background: var(--baseline);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.55);
    }
    .guide-line.vertical {
      width: 1px;
      top: 0;
      bottom: 0;
    }
    .guide-line.horizontal {
      height: 1px;
      left: 0;
      right: 0;
    }
    .guide-measure {
      position: absolute;
      padding: 4px 8px;
      border-radius: 999px;
      background: #111;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      line-height: 1;
      white-space: nowrap;
      transform: translate(-50%, -50%);
      box-shadow: 0 8px 18px rgba(17, 17, 17, 0.16);
    }
    .price-tag {
      position: absolute;
      min-height: 0;
      padding: 0;
      border: 0;
      background: transparent;
      border-radius: 8px;
      cursor: move;
      touch-action: none;
      transition: border-color 0.16s ease, box-shadow 0.16s ease, transform 0.16s ease;
      z-index: 2;
      pointer-events: auto;
    }
    .price-tag.active {
      box-shadow: 0 0 0 3px rgba(33, 197, 191, 0.14);
    }
    .price-tag input {
      width: 100%;
      min-height: 0;
      padding: 0;
      border: 0;
      outline: none;
      background: transparent;
      color: #000;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 9pt;
      line-height: 1;
      text-align: right;
      font-weight: 500;
      font-variant-numeric: tabular-nums lining-nums;
      font-feature-settings: "tnum" 1, "lnum" 1;
      letter-spacing: 0.01em;
      font-kerning: none;
      cursor: text;
      display: block;
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: antialiased;
    }
    .price-tag.committed,
    .price-tag.exporting {
      border-color: transparent;
      box-shadow: none;
    }
    .price-tag.committed input {
      pointer-events: none;
      cursor: move;
    }
    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .toolbar { position: static; }
    }
  </style>
</head>

    <section class="workspace-card">
      <div class="status-bar">
        <span id="message">Carga uno o varios PDF para empezar.</span>
      </div>
      <div class="workspace">
        <div id="canvasList" class="canvas-list"></div>
        <div id="emptyState" class="empty-state">
          <span>El area de trabajo aparecera aqui. Cada PDF se convierte en un lienzo apilado para que edites todo junto y luego exportes el conjunto completo.</span>
        </div>
      </div>
    </section>
  </div>

  <script>
    const imageLoader = document.getElementById('imageLoader');
    const addPriceBtn = document.getElementById('addPriceBtn');
    const duplicateBtn = document.getElementById('duplicateBtn');
    const deleteBtn = document.getElementById('deleteBtn');
    const clearBtn = document.getElementById('clearBtn');
    const exportBtn = document.getElementById('exportBtn');
    const canvasList = document.getElementById('canvasList');
    const message = document.getElementById('message');
    const emptyState = document.getElementById('emptyState');
    const SNAP_THRESHOLD = 12;
    if (window.pdfjsLib) {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }

    let priceCount = 0;
    let dragState = null;
    let activeSheetId = null;
    let sheetCount = 0;
    let lastCreatedTag = null;

    function updateStatus(text) {
      message.textContent = text;
      addPriceBtn.disabled = !activeSheetId;
      duplicateBtn.disabled = !document.querySelector('.price-tag');
      deleteBtn.disabled = !document.querySelector('.price-tag.active');
    }

    function toggleEmptyState() {
      emptyState.style.display = canvasList.querySelector('.menu-sheet') ? 'none' : 'grid';
    }

    function getSheetElement(sheetId) {
      return canvasList.querySelector(`[data-sheet-id="${sheetId}"]`);
    }

    function getSheetOverlay(sheetOrId) {
      const sheet = typeof sheetOrId === 'string' ? getSheetElement(sheetOrId) : sheetOrId;
      return sheet ? sheet.querySelector('.sheet-overlay') : null;
    }

    function getSheetRect(sheetId) {
      const overlay = getSheetOverlay(sheetId);
      return overlay ? overlay.getBoundingClientRect() : null;
    }

    function getSheetCanvas(sheet) {
      return sheet ? sheet.querySelector('.sheet-canvas') : null;
    }

    function getGuideLayer(sheetOrId) {
      const sheet = typeof sheetOrId === 'string' ? getSheetElement(sheetOrId) : sheetOrId;
      return sheet ? sheet.querySelector('.guide-layer') : null;
    }

    function clearGuides(sheetOrId) {
      const guideLayer = getGuideLayer(sheetOrId);
      if (guideLayer) guideLayer.innerHTML = '';
    }

    function renderGuideLine(guideLayer, axis, position, baseline = false) {
      const guide = document.createElement('div');
      guide.className = `guide-line ${axis === 'x' ? 'vertical' : 'horizontal'}${baseline ? ' baseline' : ''}`;
      if (axis === 'x') guide.style.left = `${position}px`;
      else guide.style.top = `${position}px`;
      guideLayer.appendChild(guide);
    }

    function renderMeasure(guideLayer, x, y, text) {
      return;
    }

    function renderSelectionGuides(tag) {
      if (!tag) return;
      const guideLayer = getGuideLayer(tag.dataset.sheetId);
      const input = getTagInput(tag);
      if (!guideLayer || !input) return;
      clearGuides(tag.dataset.sheetId);
      const metrics = getTextMetrics(input);
      const rightX = getTagAnchorX(tag);
      const baselineY = getTagBaselineY(tag);
      const leftX = rightX - metrics.width;
      const bottomY = baselineY + metrics.descent;
      renderGuideLine(guideLayer, 'x', leftX, true);
      renderGuideLine(guideLayer, 'x', rightX, false);
      renderGuideLine(guideLayer, 'y', bottomY, true);
      renderMeasure(guideLayer, rightX - tag.offsetWidth / 2, Math.max(14, baselineY - 14), `${Math.round(rightX)} / ${Math.round(baselineY)} px`);
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function getTagInput(tag) {
      return tag ? tag.querySelector('input') : null;
    }

    function getTextMetrics(input) {
      const styles = window.getComputedStyle(input);
      const fontSize = parseFloat(styles.fontSize || '12');
      const lineHeight = parseFloat(styles.lineHeight || String(fontSize));
      const fontFamily = styles.fontFamily || '"Helvetica Neue", Helvetica, Arial, sans-serif';
      const fontWeight = styles.fontWeight || '500';
      const canvas = getTextMetrics.canvas || (getTextMetrics.canvas = document.createElement('canvas'));
      const context = canvas.getContext('2d');
      context.font = `${fontWeight} ${fontSize}px ${fontFamily}`;
      const metrics = context.measureText(input.value || input.placeholder || '0');
      const ascent = metrics.actualBoundingBoxAscent || fontSize * 0.78;
      const descent = metrics.actualBoundingBoxDescent || Math.max(1, lineHeight - ascent);
      return { fontSize, lineHeight, ascent, descent };
    }

    function getTagAnchorX(tag) {
      const stored = parseFloat(tag.dataset.anchorX || '');
      if (Number.isFinite(stored)) return stored;
      return parseFloat(tag.style.left || '0') + tag.offsetWidth;
    }

    function getTagBaselineY(tag) {
      const stored = parseFloat(tag.dataset.anchorY || '');
      if (Number.isFinite(stored)) return stored;
      const input = getTagInput(tag);
      if (!input) return parseFloat(tag.style.top || '0');
      const metrics = getTextMetrics(input);
      return parseFloat(tag.style.top || '0') + metrics.ascent;
    }

    function setTagPosition(tag, x, baselineY) {
      const overlay = tag.closest('.sheet-overlay');
      const input = getTagInput(tag);
      if (!overlay || !input) return;
      const metrics = getTextMetrics(input);
      const minRightX = tag.offsetWidth;
      const maxRightX = Math.max(minRightX, overlay.clientWidth);
      const minBaseline = metrics.ascent;
      const maxBaseline = Math.max(minBaseline, overlay.clientHeight - metrics.descent);
      const clampedX = clamp(x, minRightX, maxRightX);
      const clampedBaselineY = clamp(baselineY, minBaseline, maxBaseline);
      tag.dataset.anchorX = String(clampedX);
      tag.dataset.anchorY = String(clampedBaselineY);
      tag.style.left = `${clampedX - tag.offsetWidth}px`;
      tag.style.top = `${clampedBaselineY - metrics.ascent}px`;
    }

    function resizeInput(input) {
      const measure = document.createElement('span');
      const styles = window.getComputedStyle(input);
      measure.style.position = 'absolute';
      measure.style.visibility = 'hidden';
      measure.style.whiteSpace = 'pre';
      measure.style.fontFamily = styles.fontFamily;
      measure.style.fontSize = styles.fontSize;
      measure.style.fontWeight = styles.fontWeight;
      measure.textContent = input.value || input.placeholder || '$0';
      document.body.appendChild(measure);
      const width = Math.ceil(measure.getBoundingClientRect().width + 4);
      document.body.removeChild(measure);
      input.parentElement.style.width = `${Math.max(24, Math.min(width, 220))}px`;
    }

    function activateTag(tag) {
      document.querySelectorAll('.price-tag').forEach((item) => item.classList.remove('active'));
      document.querySelectorAll('.menu-sheet').forEach((sheet) => clearGuides(sheet));
      if (tag) {
        tag.classList.add('active');
        setActiveSheet(tag.dataset.sheetId);
        renderSelectionGuides(tag);
      } else {
        updateStatus(activeSheetId ? 'Puedes agregar o mover precios.' : 'Carga uno o varios PDF para empezar.');
      }
    }

    function startEditingTag(tag) {
      const input = getTagInput(tag);
      if (!input) return;
      tag.classList.remove('committed');
      activateTag(tag);
      input.focus();
      input.select();
    }

    function setActiveSheet(sheetId) {
      activeSheetId = sheetId;
      document.querySelectorAll('.menu-sheet').forEach((sheet) => {
        sheet.classList.toggle('active', sheet.dataset.sheetId === sheetId);
      });
      if (sheetId) {
        const sheet = getSheetElement(sheetId);
        const badge = sheet ? sheet.querySelector('.sheet-badge') : null;
        updateStatus(`${badge ? badge.textContent : 'Lienzo activo'} seleccionado. Puedes agregar o mover precios.`);
      } else {
        updateStatus('Carga uno o varios PDF para empezar.');
      }
    }

    function findSnapPosition(tag, proposedX, proposedY) {
      const overlay = tag.closest('.sheet-overlay');
      const guideLayer = getGuideLayer(tag.dataset.sheetId);
      if (!overlay || !guideLayer) return { x: proposedX, y: proposedY };
      clearGuides(tag.dataset.sheetId);

      const tagWidth = tag.offsetWidth;
      const input = getTagInput(tag);
      const ownMetrics = input ? getTextMetrics(input) : { ascent: 0, descent: tag.offsetHeight, width: tag.offsetWidth };
      const candidates = Array.from(overlay.querySelectorAll('.price-tag')).filter((item) => item !== tag);
      const ownPointsX = [proposedX - ownMetrics.width, proposedX];
      const ownPointsY = [proposedY, proposedY + ownMetrics.descent];
      let bestX = null;
      let bestY = null;

      candidates.forEach((other) => {
        const otherInput = getTagInput(other);
        const otherMetrics = otherInput ? getTextMetrics(otherInput) : { ascent: 0, descent: other.offsetHeight, width: other.offsetWidth };
        const otherX = getTagAnchorX(other);
        const otherY = getTagBaselineY(other);
        const otherPointsX = [otherX - otherMetrics.width, otherX];
        const otherPointsY = [otherY, otherY + otherMetrics.descent];

        const baselineDelta = otherY - proposedY;
        const baselineDistance = Math.abs(baselineDelta);
        if (baselineDistance <= SNAP_THRESHOLD && (!bestY || baselineDistance < bestY.distance || !bestY.isBaseline)) {
          bestY = { distance: baselineDistance, snappedY: proposedY + baselineDelta, guideY: otherY, isBaseline: true };
        }

        ownPointsX.forEach((ownPoint) => {
          otherPointsX.forEach((otherPoint) => {
            const delta = otherPoint - ownPoint;
            const distance = Math.abs(delta);
            if (distance <= SNAP_THRESHOLD && (!bestX || distance < bestX.distance)) {
              bestX = { distance, snappedX: proposedX + delta, guideX: otherPoint };
            }
          });
        });

        ownPointsY.forEach((ownPoint) => {
          otherPointsY.forEach((otherPoint) => {
            const delta = otherPoint - ownPoint;
            const distance = Math.abs(delta);
            if (distance <= SNAP_THRESHOLD && (!bestY || (!bestY.isBaseline && distance < bestY.distance))) {
              bestY = { distance, snappedY: proposedY + delta, guideY: otherPoint, isBaseline: false };
            }
          });
        });
      });

      let nextX = proposedX;
      let nextY = proposedY;
      if (bestX) {
        nextX = bestX.snappedX;
        renderGuideLine(guideLayer, 'x', bestX.guideX);
      }
      if (bestY) {
        nextY = bestY.snappedY;
        renderGuideLine(guideLayer, 'y', bestY.guideY);
      }

      if (input) {
        renderGuideLine(guideLayer, 'y', nextY + ownMetrics.descent, true);
        renderGuideLine(guideLayer, 'x', nextX - ownMetrics.width, true);
      }

      renderMeasure(guideLayer, nextX - ownMetrics.width / 2, Math.max(14, nextY - 14), `${Math.round(nextX)} / ${Math.round(nextY)} px`);
      return { x: nextX, y: nextY };
    }

    async function buildExportCanvas(sheet) {
      const overlay = getSheetOverlay(sheet);
      const sourceCanvas = getSheetCanvas(sheet);
      if (!overlay || !sourceCanvas) return null;

      const exportCanvas = document.createElement('canvas');
      exportCanvas.width = sourceCanvas.width;
      exportCanvas.height = sourceCanvas.height;
      const context = exportCanvas.getContext('2d');
      context.drawImage(sourceCanvas, 0, 0);

      const scaleX = sourceCanvas.width / Math.max(overlay.clientWidth, 1);
      const scaleY = sourceCanvas.height / Math.max(overlay.clientHeight, 1);
      const tags = Array.from(overlay.querySelectorAll('.price-tag'));

      tags.forEach((tag) => {
        const input = getTagInput(tag);
        if (!input) return;
        const value = (input.value || input.placeholder || '').trim();
        if (!value) return;

        const styles = window.getComputedStyle(input);
        const metrics = getTextMetrics(input);
        const fontFamily = styles.fontFamily || '"Helvetica Neue", Helvetica, Arial, sans-serif';
        const fontWeight = styles.fontWeight || '500';
        const fontSize = metrics.fontSize * scaleY;
        const anchorX = getTagAnchorX(tag) * scaleX;
        const baselineY = getTagBaselineY(tag) * scaleY;

        context.save();
        context.font = `${fontWeight} ${fontSize}px ${fontFamily}`;
        context.fillStyle = styles.color || '#000000';
        context.textAlign = 'right';
        context.textBaseline = 'alphabetic';
        context.fillText(value, anchorX, baselineY);
        context.restore();
      });

      return exportCanvas;
    }

    function addPriceTag(prefill = '', position = null, sheetId = activeSheetId) {
      if (!sheetId) {
        updateStatus('Primero carga al menos un PDF y selecciona un lienzo.');
        return null;
      }
      const overlay = getSheetOverlay(sheetId);
      if (!overlay) {
        updateStatus('No se encontro el lienzo activo.');
        return null;
      }

      const tag = document.createElement('div');
      tag.className = 'price-tag active';
      tag.dataset.sheetId = sheetId;
      tag.dataset.index = String(priceCount + 1);

      const input = document.createElement('input');
      input.type = 'text';
      input.placeholder = '$0';
      input.value = prefill;
      input.spellcheck = false;
      input.autocomplete = 'off';

      tag.appendChild(input);
      overlay.appendChild(tag);
      resizeInput(input);
      const initialX = position ? position.x : (overlay.clientWidth / 2) + (tag.offsetWidth / 2);
      const initialY = position ? position.y : (overlay.clientHeight / 2);
      setTagPosition(tag, initialX, initialY);

      priceCount += 1;
      lastCreatedTag = tag;
      activateTag(tag);
      input.focus();
      input.select();
      updateStatus(`Precio ${priceCount} creado. Puedes arrastrarlo y editarlo.`);

      input.addEventListener('input', () => {
        const anchorX = getTagAnchorX(tag);
        const baselineY = getTagBaselineY(tag);
        resizeInput(input);
        setTagPosition(tag, anchorX, baselineY);
      });
      input.addEventListener('focus', () => activateTag(tag));
      input.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          tag.classList.add('committed');
          tag.classList.remove('active');
          input.blur();
          clearGuides(tag.dataset.sheetId);
          updateStatus('Precio confirmado.');
        }
      });

      tag.addEventListener('pointerdown', (event) => {
        if (event.target === input && !tag.classList.contains('committed')) {
          activateTag(tag);
          return;
        }
        const rect = tag.getBoundingClientRect();
        const inputMetrics = getTextMetrics(input);
        dragState = {
          tag,
          sheetId: tag.dataset.sheetId,
          pointerId: event.pointerId,
          offsetX: event.clientX - (rect.left + tag.offsetWidth),
          offsetY: event.clientY - (rect.top + inputMetrics.ascent)
        };
        tag.setPointerCapture(event.pointerId);
        activateTag(tag);
        event.preventDefault();
      });

      tag.addEventListener('dblclick', () => {
        startEditingTag(tag);
        updateStatus('Precio listo para editar.');
      });

      return tag;
    }

    function duplicatePriceTag() {
      const sourceTag = document.querySelector('.price-tag.active') || lastCreatedTag || document.querySelector('.price-tag:last-of-type');
      if (!sourceTag) {
        updateStatus('No hay ningun precio para duplicar.');
        return;
      }
      const sourceInput = getTagInput(sourceTag);
      const x = getTagAnchorX(sourceTag);
      const y = getTagBaselineY(sourceTag);
      addPriceTag(sourceInput ? sourceInput.value : '', { x, y: y + 24 }, sourceTag.dataset.sheetId);
      updateStatus('Precio duplicado.');
    }

    function deleteActivePriceTag() {
      const activeTag = document.querySelector('.price-tag.active');
      if (!activeTag) {
        updateStatus('No hay ningun precio activo para borrar.');
        return;
      }
      if (lastCreatedTag === activeTag) lastCreatedTag = null;
      clearGuides(activeTag.dataset.sheetId);
      activeTag.remove();
      priceCount = Math.max(0, priceCount - 1);
      activateTag(null);
      updateStatus('Precio borrado.');
    }

    function clearAll() {
      document.querySelectorAll('.price-tag').forEach((tag) => tag.remove());
      document.querySelectorAll('.menu-sheet').forEach((sheet) => sheet.remove());
      priceCount = 0;
      sheetCount = 0;
      activeSheetId = null;
      lastCreatedTag = null;
      imageLoader.value = '';
      toggleEmptyState();
      updateStatus('Todo limpio. Carga otro PDF para seguir.');
    }

    async function exportToPdf() {
      const sheets = Array.from(document.querySelectorAll('.menu-sheet'));
      if (!sheets.length) {
        updateStatus('No hay PDF cargado para exportar.');
        return;
      }

      updateStatus('Preparando PDF...');

      try {
        if (!window.jspdf || !window.jspdf.jsPDF) throw new Error('jsPDF no cargo correctamente');

        const { jsPDF } = window.jspdf;
        let pdf = null;

        for (let index = 0; index < sheets.length; index += 1) {
          const sheet = sheets[index];
          const sourceCanvas = getSheetCanvas(sheet);
          const exportCanvas = await buildExportCanvas(sheet);
          if (!sourceCanvas || !exportCanvas) continue;
          const pageWidth = Number(sheet.dataset.pageWidth || sourceCanvas.width);
          const pageHeight = Number(sheet.dataset.pageHeight || sourceCanvas.height);
          const orientation = pageWidth > pageHeight ? 'landscape' : 'portrait';

          if (!pdf) {
            pdf = new jsPDF({ orientation, unit: 'pt', format: [pageWidth, pageHeight], compress: true });
          } else {
            pdf.addPage([pageWidth, pageHeight], orientation);
            pdf.setPage(index + 1);
          }

          pdf.addImage(exportCanvas.toDataURL('image/png', 1.0), 'PNG', 0, 0, pageWidth, pageHeight, undefined, 'FAST');
        }

        if (!pdf) throw new Error('No se pudo generar el PDF final');
        pdf.save('menu-precios.pdf');
        updateStatus('PDF exportado correctamente.');
      } catch (error) {
        console.error(error);
        updateStatus('No se pudo exportar el PDF. Recarga la pagina y prueba de nuevo.');
      }
    }

    async function loadPdfFile(file) {
      if (!window.pdfjsLib) throw new Error('pdf.js no cargo correctamente');
      const buffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({
        data: buffer,
        useWorkerFetch: false,
        isEvalSupported: false
      }).promise;

      const page = await pdf.getPage(1);
      const baseViewport = page.getViewport({ scale: 1 });
      const scale = 1800 / baseViewport.width;
      const viewport = page.getViewport({ scale });
      const canvas = document.createElement('canvas');
      const context = canvas.getContext('2d');
      canvas.width = Math.floor(viewport.width);
      canvas.height = Math.floor(viewport.height);
      canvas.className = 'sheet-canvas';

      await page.render({
        canvasContext: context,
        viewport,
        intent: 'print'
      }).promise;

      return {
        canvas,
        pageWidth: baseViewport.width,
        pageHeight: baseViewport.height
      };
    }

    function createSheet(pdfAsset, fileName) {
      sheetCount += 1;
      const sheetId = `sheet-${sheetCount}`;
      const sheet = document.createElement('section');
      sheet.className = 'menu-sheet';
      sheet.dataset.sheetId = sheetId;
      sheet.dataset.pageWidth = String(pdfAsset.pageWidth);
      sheet.dataset.pageHeight = String(pdfAsset.pageHeight);

      const badge = document.createElement('div');
      badge.className = 'sheet-badge';
      badge.textContent = `PDF ${sheetCount}: ${fileName}`;

      const frame = document.createElement('div');
      frame.className = 'sheet-frame';

      const stage = document.createElement('div');
      stage.className = 'sheet-stage';
      stage.style.aspectRatio = `${pdfAsset.pageWidth} / ${pdfAsset.pageHeight}`;

      const overlay = document.createElement('div');
      overlay.className = 'sheet-overlay';
      const guideLayer = document.createElement('div');
      guideLayer.className = 'guide-layer';

      overlay.appendChild(guideLayer);
      stage.appendChild(pdfAsset.canvas);
      stage.appendChild(overlay);
      frame.appendChild(stage);
      sheet.appendChild(badge);
      sheet.appendChild(frame);
      canvasList.appendChild(sheet);

      sheet.addEventListener('pointerdown', (event) => {
        if (!event.target.closest('.price-tag')) setActiveSheet(sheetId);
      });

      return sheetId;
    }

    imageLoader.addEventListener('change', async (event) => {
      const files = Array.from(event.target.files || []);
      if (!files.length) return;
      const invalid = files.find((file) => file.type !== 'application/pdf' && !file.name.toLowerCase().endsWith('.pdf'));
      if (invalid) {
        updateStatus('Todos los archivos deben ser PDF.');
        imageLoader.value = '';
        return;
      }

      updateStatus(`Procesando ${files.length} PDF...`);
      try {
        let lastSheetId = activeSheetId;
        for (const file of files) {
          const pdfAsset = await loadPdfFile(file);
          lastSheetId = createSheet(pdfAsset, file.name);
        }
        toggleEmptyState();
        if (lastSheetId) setActiveSheet(lastSheetId);
        updateStatus(`${files.length} PDF cargado(s). Haz clic en un lienzo para editarlo.`);
      } catch (error) {
        console.error(error);
        toggleEmptyState();
        updateStatus('No se pudo leer uno de los PDF. Prueba de nuevo.');
      } finally {
        imageLoader.value = '';
      }
    });

    window.addEventListener('pointermove', (event) => {
      if (!dragState) return;
      const bounds = getSheetRect(dragState.sheetId);
      if (!bounds) return;
      const nextX = event.clientX - bounds.left - dragState.offsetX;
      const nextY = event.clientY - bounds.top - dragState.offsetY;
      const snapped = findSnapPosition(dragState.tag, nextX, nextY);
      setTagPosition(dragState.tag, snapped.x, snapped.y);
    });

    window.addEventListener('pointerup', (event) => {
      if (!dragState) return;
      try { dragState.tag.releasePointerCapture(event.pointerId); } catch (error) {}
      renderSelectionGuides(dragState.tag);
      updateStatus('Posicion actualizada.');
      dragState = null;
    });

    window.addEventListener('resize', () => {
      document.querySelectorAll('.price-tag').forEach((tag) => {
        setTagPosition(tag, getTagAnchorX(tag), getTagBaselineY(tag));
      });
    });

    addPriceBtn.addEventListener('click', () => addPriceTag());
    duplicateBtn.addEventListener('click', duplicatePriceTag);
    deleteBtn.addEventListener('click', deleteActivePriceTag);
    clearBtn.addEventListener('click', clearAll);
    exportBtn.addEventListener('click', exportToPdf);
    document.addEventListener('pointerdown', (event) => {
      if (!event.target.closest('.price-tag') && !event.target.closest('.menu-sheet')) {
        activateTag(null);
      }
    });

    toggleEmptyState();
    updateStatus('Carga uno o varios PDF para empezar.');
  </script>
</body>
</html>
